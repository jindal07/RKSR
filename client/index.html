<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RamKishan Siyaram — Clothing Store</title>
    <meta name="description" content="RamKishan Siyaram — timeless clothing for men, women and kids. Kurtas, sarees, shirts and more." />
    <script>
      // Apply theme before React mounts to avoid flash of wrong theme
      (function () {
        var saved = localStorage.getItem('theme');
        var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
        // Always start at the top — stop the browser restoring scroll on refresh
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
        window.scrollTo(0, 0);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
